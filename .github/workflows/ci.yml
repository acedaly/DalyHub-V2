name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only needs to read the repository. It requires
# no Cloudflare credentials — ordinary pull-request validation never deploys.
permissions:
  contents: read

jobs:
  verify:
    name: Verify (lint, types, tests, build, e2e)
    runs-on: ubuntu-latest
    # Raised from 15 for the DS-11 accessibility + responsive regression coverage,
    # which adds axe scans and a 320px→ultra-wide overflow sweep to the E2E run.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Unit & component tests
        run: pnpm run test:unit

      - name: Kernel integration tests (Workers runtime + D1)
        # Runs the FND-02 data-kernel suite inside the real Workers runtime with
        # an isolated, local D1 (Miniflare). The committed migration is applied
        # to a fresh test database — D1 is not mocked. No Cloudflare credentials
        # or remote database are used.
        run: pnpm run test:kernel

      - name: Production build
        run: pnpm run build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E, accessibility & responsive regression
        # Runs the full Playwright suite, which now includes the DS-11 automated
        # accessibility gate (axe-core WCAG 2.2 AA scans of every shared surface, in
        # light and dark, with modal overlays open) and the responsive regression
        # matrix (no horizontal overflow from 320px through ultra-wide). A genuine
        # accessibility or layout regression fails the build here.
        run: pnpm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
