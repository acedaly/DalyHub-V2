name: Roadmap lint diagnostic

on:
  push:
    branches:
      - feat/production-roadmap-project

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/production-roadmap-project
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Fix known lint issue
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/roadmap-production.mjs")
          text = path.read_text()
          old = r'.replace(/\[([^\]]+)\]\([^\)]+\)/g, "$1")'
          new = r'.replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")'
          if old in text:
              path.write_text(text.replace(old, new))
          PY
          pnpm exec prettier --write scripts/roadmap-production.mjs
      - name: Capture lint output
        run: pnpm lint > roadmap-lint-output.txt 2>&1 || true
      - name: Commit results
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/roadmap-production.mjs roadmap-lint-output.txt
          git commit -m "fix: satisfy roadmap runner lint"
          git push origin HEAD:feat/production-roadmap-project
